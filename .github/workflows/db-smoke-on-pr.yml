name: DB smoke (migrations + seed + smoke e2e)

on:
  pull_request:
    paths:
      - 'prisma/**'
      - 'Haypbooks/Backend/scripts/**'
      - 'Haypbooks/Frontend/e2e/scripts/**'
      - 'test/**'

jobs:
  db-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Ninetails45
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend deps
        working-directory: ./Haypbooks/Backend
        run: npm ci

      - name: Run migrations and seed (with retries)
        working-directory: ./Haypbooks/Backend
        env:
          DATABASE_URL: postgresql://postgres:Ninetails45@localhost:5432/haypbooks_test
        run: |
          node ./scripts/migrate/init-db.js --recreate
          node ./scripts/migrate/run-sql.js
          npm run db:seed:dev

      - name: CI sanity check (seed verification)
        working-directory: ./Haypbooks/Backend
        env:
          DATABASE_URL: postgresql://postgres:Ninetails45@localhost:5432/haypbooks_test
        run: |
          node ./scripts/db/ci-sanity-check.js

      - name: Run smoke e2e (subset)
        working-directory: ./Haypbooks/Backend
        env:
          DATABASE_URL: postgresql://postgres:Ninetails45@localhost:5432/haypbooks_test
          NODE_ENV: 'test'
        run: |
          # Run a focused subset (contacts + payroll smoke) to validate migrations and seeds
          npm run test:serial -- -- test/contacts.e2e-spec.ts test/payroll.submit.e2e-spec.ts

      # Build and start backend server so Playwright tests can exercise HTTP endpoints
      - name: Build and start backend server
        working-directory: ./Haypbooks/Backend
        env:
          ALLOW_TEST_ENDPOINTS: 'true'
          NODE_ENV: 'test'
        run: |
          npm run build
          # Start server in background so subsequent steps can hit http://localhost:4000
          nohup env ALLOW_TEST_ENDPOINTS=true NODE_ENV=test npm start &

      - name: Wait for backend health
        run: node ./scripts/wait-for-backend.js http://127.0.0.1:4000/api/health 60

      # Build and run a focused frontend e2e to validate the Central Hub in a PR (requires ALLOW_TEST_ENDPOINTS)
      - name: Install frontend deps
        working-directory: ./Haypbooks/Frontend
        run: npm ci

      - name: Build and start frontend
        working-directory: ./Haypbooks/Frontend
        run: |
          npm run build
          nohup npm start &

      - name: Install Playwright browsers
        working-directory: ./Haypbooks/Frontend
        run: npx playwright install --with-deps

      - name: Run focused Central Hub E2E
        working-directory: ./Haypbooks/Frontend
        env:
          ALLOW_TEST_ENDPOINTS: 'true'
          NODE_ENV: 'test'
        run: |
          # Run a focused set of Playwright specs validating Central Hub, signup, and login redirects
          npm run e2e -- e2e/central-hub-recent.spec.ts e2e/signup-role-hub.spec.ts e2e/accountant-login.spec.ts

      - name: Upload Playwright report (Central Hub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-hub-playwright-report
          path: Haypbooks/Frontend/playwright-report

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-smoke-artifacts
          path: |
            Haypbooks/Backend/jest-e2e-results
            Haypbooks/Backend/coverage
