name: Prisma migration check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: haypbooks_migration_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d haypbooks_migration_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: Backend
      - name: Wait for Postgres
        run: |
          for i in {1..20}; do pg_isready -h localhost -p 5432 && break || sleep 1; done
      - name: Export DATABASE_URL
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/haypbooks_migration_test" >> $GITHUB_ENV
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=Backend
      - name: Run migrations
        run: npx prisma migrate deploy --schema=Backend/prisma/schema.prisma
      - name: Run DB diagnostics
        run: node scripts/db_diagnostic.js
        working-directory: Backend
      - name: Verify expected schema
        run: npm run verify:expected-schema --workspace=Backend

  lint-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
        working-directory: Backend
      - name: Lint migrations (tenant/rls checks)
        run: |
          npm run lint:migrations:tenant --workspace=Backend
          npm run lint:migrations:rls --workspace=Backend
