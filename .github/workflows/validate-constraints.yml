name: Validate Constraints (Manual)

on:
  workflow_dispatch:
    inputs:
      validate:
        description: 'If true, run validations (ALTER TABLE VALIDATE) after reporting'
        required: false
        default: 'false'

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: haypbooks_test
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Install Backend deps
        working-directory: Haypbooks/Backend
        run: npm ci

      - name: Set DATABASE_URL
        working-directory: Haypbooks/Backend
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/haypbooks_test" >> $GITHUB_ENV

      - name: Apply migrations
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npx prisma generate

      - name: Report unvalidated constraints
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npx ts-node scripts/db/check-unvalidated-constraints.ts

      - name: Validate unvalidated tenant FKs (optional)
        if: ${{ github.event.inputs.validate == 'true' }}
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: node scripts/ci/validate-unvalidated-tenant-fks.js
