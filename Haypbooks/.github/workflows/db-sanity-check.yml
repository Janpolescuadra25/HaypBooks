name: DB Sanity Checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

jobs:
  db-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check DATABASE_URL
        id: checkdb
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set. Skipping DB sanity checks.";
            echo "skip=true" >> $GITHUB_OUTPUT;
            exit 0;
          else
            echo "skip=false" >> $GITHUB_OUTPUT;
          fi

      - name: Run workspace_name presence check
        if: steps.checkdb.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Running Tenant workspace_name check"
          npm --prefix Haypbooks/Backend run db:check:workspace-name

      - name: Run duplicate companies detector (dry-run)
        if: steps.checkdb.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Running duplicate companies detector (dry-run)"
          node --version
          # this script prints any duplicate groups; it should run against a test/staging DB only
          ts-node Haypbooks/Backend/scripts/db/find-duplicate-companies.ts || true

      - name: Done
        run: echo "DB sanity checks completed (or skipped)"