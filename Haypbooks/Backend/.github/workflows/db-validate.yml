name: DB Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: haypbooks_test
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (workspace)
        run: npm ci

      - name: Install Backend deps
        working-directory: Haypbooks/Backend
        run: npm ci

      - name: Set DATABASE_URL
        working-directory: Haypbooks/Backend
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/haypbooks_test" >> $GITHUB_ENV

      - name: Prisma migrate deploy
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npx prisma generate

      - name: Seed database
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          if [ -f scripts/db/seed.ts ]; then npx ts-node scripts/db/seed.ts; fi

      - name: Migration linter
        working-directory: Haypbooks/Backend
        run: npx ts-node scripts/ci/check-migrations.ts

      - name: Schema smoke checks
        working-directory: Haypbooks/Backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          STRICT_CONSTRAINT_VALIDATION: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: |
          npx ts-node scripts/db/check-schema.ts || true
          npx ts-node scripts/db/check-unvalidated-constraints.ts || true
          npx ts-node scripts/db/smoke-tests.ts
