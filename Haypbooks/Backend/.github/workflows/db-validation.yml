name: DB Validation & Integration Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  db-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: haypbooks_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U postgres && break || sleep 1
          done

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/haypbooks_dev" >> $GITHUB_ENV

      - name: Run idempotent DDL script (safe application)
        run: npx ts-node scripts/db/add-attachment-task-columns.ts

      - name: Apply migrations (run-sql)
        run: node ./scripts/migrate/run-sql.js

      - name: Prisma migrate status (CI verification)
        run: npm run prisma:verify:migrate

      - name: Run DB Validation Script
        run: npx ts-node scripts/final-db-validation.ts

      - name: Run integration tests
        run: npx jest test/integration --runInBand --testTimeout=30000
