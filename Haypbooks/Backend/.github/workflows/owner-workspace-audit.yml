name: "Owner Workspace Audit"

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *' # nightly at 02:00 UTC

jobs:
  audit-staging:
    name: Audit (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run Owner Workspace audit (staging DB)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          echo "Running owner-workspace-audit against staging DB"
          npx ts-node scripts/debug/owner-workspace-audit.ts

  db-regression-tests:
    name: DB Regression Tests (staging DB)
    runs-on: ubuntu-latest
    needs: audit-staging
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run company-name regression test
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          echo "Running DB regression tests"
          npm run test:serial -- test/db/company-name-regression.e2e-spec.ts -i
