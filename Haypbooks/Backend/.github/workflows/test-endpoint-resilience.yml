name: Test endpoint resilience

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Haypbooks/Backend/**'
  push:
    branches: [ main, master ]

jobs:
  resilience:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Ninetails45
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: |
            Haypbooks/Backend/node_modules
            ~/.npm
          key: ${{ runner.os }}-backend-node-${{ hashFiles('Haypbooks/Backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-

      - name: Install dependencies
        working-directory: ./Haypbooks/Backend
        run: npm ci

      - name: Run migrations & seed
        working-directory: ./Haypbooks/Backend
        env:
          DATABASE_URL: postgresql://postgres:Ninetails45@localhost:5432/haypbooks_test
        run: |
          npm run migrate:init
          node ./scripts/migrate/run-sql.js
          npm run db:seed:dev

      - name: Run resilience e2e (focused)
        working-directory: ./Haypbooks/Backend
        env:
          DATABASE_URL: postgresql://postgres:Ninetails45@localhost:5432/haypbooks_test
          NODE_ENV: 'test'
          ALLOW_TEST_ENDPOINTS: 'true'
        run: npx jest test/test.companies.resilience.e2e-spec.ts --runInBand --config jest.e2e.config.js

      - name: Upload artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-resilience-output
          path: |
            Haypbooks/Backend/jest-e2e-results
            Haypbooks/Backend/coverage
