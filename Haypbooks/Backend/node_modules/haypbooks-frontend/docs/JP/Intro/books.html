<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haypbooks | The Portal to Clarity</title>
    <link rel="stylesheet" href="books.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="chaosWorld">
        <div class="portal-container" id="portal">
            <div class="portal-ring"></div>
            <div class="portal-core">H</div>
        </div>
    </div>

    <main id="clarityWorld">
        <div class="content-stage">
            <div class="hero-text">
                <h1 class="headline">Leave the <span class="strike">sheets</span> behind.</h1>
                <h2 class="subheadline">Enter the new dimension of accounting.</h2>
                <p class="description">Haypbooks turns complex data into clear, actionable 3D insights. Fast, intuitive, and brilliantly simple.</p>
                <button class="cta-btn">Enter Haypbooks</button>
            </div>

            <div class="dashboard-3d-container">
                <div class="dashboard-plane main-plane">
                    <div class="dash-header">Cash Flow Overview</div>
                    <div class="dash-chart">
                        <svg viewBox="0 0 200 100" class="wave-svg">
                            <path fill="url(#grad1)" d="M0,50 C30,60 50,30 80,40 C110,50 130,20 160,30 C180,35 190,10 200,20 L200,100 L0,100 Z"></path>
                             <defs>
                                <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
                                  <stop offset="0%" style="stop-color:var(--neon-green);stop-opacity:0.6" />
                                  <stop offset="100%" style="stop-color:var(--white);stop-opacity:0" />
                                </linearGradient>
                              </defs>
                        </svg>
                    </div>
                </div>
                <div class="dashboard-plane float-card p1">Income: $8,420</div>
                <div class="dashboard-plane float-card p2">Expenses: $2,100</div>
                <div class="dashboard-plane float-card p3 icon-card">Here</div>
            </div>
        </div>
    </main>

    <script src="books.js"></script>
</body>
</html>
