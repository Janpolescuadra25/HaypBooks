<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haypbooks | Modern Accounting Reimagined</title>
    <link rel="stylesheet" href="landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="chaosWorld">
        <div class="portal-container" id="portal">
            <div class="portal-ring"></div>
            <div class="portal-core">H</div>
        </div>
    </div>

    <main id="clarityWorld">
        <div class="content-stage">
            <div class="hero-text">
                <h1 class="headline">Leave the <span class="strike">spreadsheets</span> behind.</h1>
                <h2 class="subheadline">Enter the new era of accounting.</h2>
                <p class="description">Haypbooks transforms complex financial data into clear, actionable insights. Fast, intuitive, and brilliantly simple for modern businesses.</p>
                <button class="cta-btn" id="enterBtn">Enter Haypbooks</button>
            </div>

            <div class="dashboard-3d-container">
                <div class="dashboard-plane main-plane">
                    <div class="dash-header">Real-Time Cash Flow</div>
                    <div class="dash-chart">
                        <svg viewBox="0 0 200 100" class="wave-svg">
                            <path fill="url(#grad1)" d="M0,50 C30,60 50,30 80,40 C110,50 130,20 160,30 C180,35 190,10 200,20 L200,100 L0,100 Z"></path>
                            <defs>
                                <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
                                  <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.7" />
                                  <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>
                <div class="dashboard-plane float-card p1">Revenue: $42,800</div>
                <div class="dashboard-plane float-card p2">Expenses: $18,350</div>
                <div class="dashboard-plane float-card p3 icon-card">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                </div>
            </div>
        </div>
    </main>

    <script src="landing.js"></script>
</body>
</html>
