name: E2E Smoke: Signup Phone Only

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}

jobs:
  smoke-signup:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Ninetails45
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5


    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: |
            Haypbooks/Frontend/node_modules
            ~/.npm
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('Haypbooks/Frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Install backend deps
        working-directory: ./Haypbooks/Backend
        run: npm ci

      - name: Install frontend deps
        working-directory: ./Haypbooks/Frontend
        run: npm ci

      - name: Start backend (pre-signup mode with Redis)
        working-directory: ./Haypbooks/Backend
        env:
          DATABASE_URL: postgresql://postgres:Ninetails45@localhost:5432/haypbooks_test
          ENFORCE_PRE_SIGNUP: 'true'
          ALLOW_TEST_ENDPOINTS: 'true'
          NODE_ENV: 'test'
        run: |
          npm run migrate:init
          node ./scripts/migrate/run-sql.js
          npm run db:seed:dev
          # start backend in background
          npm run start:dev &

      - name: Wait for backend to be healthy
        uses: jakejarvis/wait-action@v0.1.2
        with:
          timeout: '60'
          url: 'http://127.0.0.1:4000/api/health'

      - name: Run Playwright smoke test (signup phone-only + onboarding)
        working-directory: ./Haypbooks/Frontend
        env:
          ALLOW_TEST_ENDPOINTS: 'true'
          E2E_FULL_AUTH: 'true'
        run: |
          # Run smoke tests plus the full onboarding UI test that asserts Owner Workspace shows created company
          npx playwright test e2e/smoke.signup-phone-only.spec.ts e2e/proxy-refresh.spec.ts e2e/pre-signup-flow.spec.ts e2e/onboarding.ui-and-hub.spec.ts --project=chromium -g "smoke" --reporter=list

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Haypbooks/Frontend/playwright-report/**
